version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: wocs_user
      POSTGRES_PASSWORD: wocs_password
      POSTGRES_DB: wocs_db
    ports:
      - '5433:5432'
    volumes:
      - wocs_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - wocs_redisdata:/data

volumes:
  wocs_pgdata:
  wocs_redisdata:
