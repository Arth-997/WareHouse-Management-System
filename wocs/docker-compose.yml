services:
  # ── Database ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: wocs_user
      POSTGRES_PASSWORD: wocs_password
      POSTGRES_DB: wocs_db
    ports:
      - '5433:5432'
    volumes:
      - wocs_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wocs_user -d wocs_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Cache ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - wocs_redisdata:/data

  # ── Backend API (NestJS) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://wocs_user:wocs_password@db:5432/wocs_db
      JWT_SECRET: wocs_production_jwt_secret_change_me
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    # Uncomment below to mount source code for live development inside Docker:
    # volumes:
    #   - ./backend/src:/app/src

  # ── Frontend (Vite/React) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    restart: always
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  wocs_pgdata:
  wocs_redisdata:
